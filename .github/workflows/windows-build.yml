name: Build Windows Client

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FLUTTER_VERSION: "3.29.0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop target
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        shell: pwsh
        run: |
          New-Item -Path build-logs -ItemType Directory -Force | Out-Null
          flutter build windows --release --verbose 2>&1 | Tee-Object -FilePath build-logs/flutter-build.log
          if (Test-Path build/windows/x64/runner/Release) {
            Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/kelivo-windows.zip -Force
          }

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: kelivo-windows-release
          path: build/kelivo-windows.zip
          if-no-files-found: error

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-logs
          path: build-logs/flutter-build.log
          if-no-files-found: error
