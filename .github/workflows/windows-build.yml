name: Build Windows Client

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop target
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_tts CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = @()
          $pubCache = Join-Path $env:LOCALAPPDATA 'Pub\Cache\hosted\pub.dev'
          if (Test-Path $pubCache) {
            $files += Get-ChildItem -Path $pubCache -Filter 'flutter_tts-*' -Directory -ErrorAction SilentlyContinue | ForEach-Object {
              Join-Path $_.FullName 'windows\CMakeLists.txt'
            }
          }
          $ephemeral = 'windows/flutter/ephemeral/.plugin_symlinks/flutter_tts/windows/CMakeLists.txt'
          if (Test-Path $ephemeral) { $files += $ephemeral }
          foreach ($file in $files) {
            if (Test-Path $file) {
              $content = Get-Content $file -Raw
              $patternNuget = '################ NuGet intall begin ################[\s\S]*?################ NuGet install end ################'
              $patternInstall = 'install DLL "$<TARGET_FILE:${BINARY_NAME}>"'
              $patched = [regex]::Replace($content, $patternNuget, '# patched nuget block removed for CI')
              $patched = $patched.Replace($patternInstall, '# patched install command removed for CI')
              if ($patched -ne $content) {
                Set-Content $file -Value $patched -Encoding UTF8
              }
            }
          }
          # Ensure windowsapp is linked to satisfy WinRT symbols
          foreach ($file in $files) {
            if (Test-Path $file) {
              $raw = Get-Content $file -Raw
              if ($raw -notmatch 'windowsapp') {
                Add-Content -Path $file -Value "`ntarget_link_libraries(${PLUGIN_NAME} PRIVATE windowsapp)`n"
              }
            }
          }
      - name: Build Windows release
        shell: pwsh
        run: |
          New-Item -Path build-logs -ItemType Directory -Force | Out-Null
          flutter build windows --release --verbose 2>&1 | Tee-Object -FilePath build-logs/flutter-build.log
          if (Test-Path build/windows/x64/runner/Release) {
            Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/kelivo-windows.zip -Force
          }

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: kelivo-windows-release
          path: build/kelivo-windows.zip
          if-no-files-found: error

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-logs
          path: build-logs/flutter-build.log
          if-no-files-found: error


